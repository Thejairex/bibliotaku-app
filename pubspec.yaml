name: bibliotaku_app
description: "Bibliotaku - Mobile app for tracking books, manga, anime and more."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado — Riverpod 3.x (todos alineados)
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navegación
  go_router: ^16.2.1

  # HTTP
  dio: ^5.8.0+1

  # Modelos inmutables y JSON — freezed 3.x
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Seguridad - token Sanctum
  flutter_secure_storage: ^9.2.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generadores — todos en 3.x/4.x alineados
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - .env